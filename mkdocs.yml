site_name: FastExcelWriter
site_description: Lightweight and very fast XLSX Excel Spreadsheet Writer in PHP
site_url: https://fast-excel-writer.readthedocs.io/
repo_url: https://github.com/aVadim483/fast-excel-writer
repo_name: aVadim483/fast-excel-writer
edit_uri: blob/master/docs/
use_directory_urls: false

theme:
  name: material
  logo: img/logo-120.png
  favicon: img/logo-120.png
  features:
    - navigation.sections
    - navigation.tracking
    - search.highlight
    - content.code.copy

nav:
  - Overview: index.md
  - Installation: index.md#installation
  - Quick Start:
      - Simple Example: index.md#simple-example
      - Advanced Example: index.md#advanced-example
  - Workbook & Sheets:
      - Workbook: 01-workbook.md
      - Sheets: 02-sheets.md
      - Page Setup & Print Settings: 02-sheets.md#page-setup
      - Protection: 06-protection.md
  - Writing & Styles:
      - Writing Cells & Rows: 03-writing.md
      - Formulas: 03-writing.md#formulas
      - Rich Text: 03-writing.md#using-rich-text
      - Styles: 04-styles.md
  - Insertions:
      - Images: index.md#adding-images
      - Notes: index.md#adding-notes
      - Charts: 05-charts.md
  - Additional Features:
      - Data Validation: 07-validation.md
      - Conditional Formatting: 08-conditional.md
  - Upgrade Guide: 09-upgrade.md
  - API Reference:
      - Overview: 90-api-reference.md
      - Excel: 91-api-class-excel.md
      - Options: 91-api-class-options.md
      - Sheet: 92-api-class-sheet.md
      - RichText: 93-api-class-rich-text.md
      - RichTextFragment: 93-api-class-rich-text-fragment.md
      - Chart: 94-api-class-chart.md
      - DataValidation: 95-api-class-data-validation.md
      - Conditional: 96-api-class-conditional.md
      - Style: 97-api-class-style.md
      - ImageStyle: 97-api-class-image-style.md
  - Other libraries:
      - FastExcelReader: https://github.com/aVadim483/fast-excel-reader
      - FastExcelTemplator: https://github.com/aVadim483/fast-excel-templator
      - Laravel Integration: https://github.com/aVadim483/fast-excel-laravel

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - tables
  - footnotes
  - def_list
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.snippets

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ru
          name: Русский
          build: true
          site_description: Быстрая и легковесная библиотека для создания XLSX-файлов на PHP
          nav_translations:
            Overview: Обзор
            Installation: Установка
            Quick Start: Быстрый старт
            Simple Example: Простой пример
            Advanced Example: Расширенный пример
            Workbook & Sheets: Книга и листы
            Workbook: Книга (Workbook)
            Sheets: Листы (Sheets)
            Page Setup & Print Settings: Параметры страницы и печати
            Protection: Защита
            Writing & Styles: Запись и стили
            Writing Cells & Rows: Запись ячеек и строк
            Formulas: Формулы
            Rich Text: Форматированный текст
            Styles: Стили
            Insertions: Вставка объектов
            Images: Изображения
            Notes: Заметки
            Charts: Диаграммы
            Additional Features: Дополнительные возможности
            Data Validation: Проверка данных
            Conditional Formatting: Условное форматирование
            Upgrade Guide: Руководство по обновлению
            API Reference: Справочник API
            Other libraries: Другие библиотеки
            Laravel Integration: Интеграция с Laravel
  # - redirects
  # - glightbox

extra_javascript:
  - ext/ext.js